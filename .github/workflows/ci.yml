name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - uses: golangci/golangci-lint-action@v7
        with:
          args: -v ./...

      - name: CI
        run: make ci SKIP_LINT=1
